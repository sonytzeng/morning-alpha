name: Deploy Morning Alpha runtime

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-morning-alpha-runtime
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Require deployment token
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: test -n "$SUPABASE_ACCESS_TOKEN"

      - name: Deploy market data collector
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: >-
          supabase functions deploy fetch-market-data-v10
          --project-ref cttfzgvhiewfckydcrci
          --no-verify-jwt

      - name: Deploy intraday radar
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: >-
          supabase functions deploy opening-market-radar
          --project-ref cttfzgvhiewfckydcrci
          --no-verify-jwt

      - name: Deploy closing review
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: >-
          supabase functions deploy close-market-review
          --project-ref cttfzgvhiewfckydcrci
          --no-verify-jwt

      - name: Deploy read-only operations health check
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: >-
          supabase functions deploy ma-ops-health-check
          --project-ref cttfzgvhiewfckydcrci
          --no-verify-jwt
