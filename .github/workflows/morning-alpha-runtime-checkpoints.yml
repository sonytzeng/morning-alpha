name: Morning Alpha runtime checkpoints

on:
  schedule:
    # GitHub cron uses UTC. Start before each published Taipei checkpoint to absorb queue latency.
    - cron: '15 23 * * 0-4'
    - cron: '25 1 * * 1-5'
    - cron: '25 2 * * 1-5'
    - cron: '55 4 * * 1-5'
    - cron: '20 6 * * 1-5'
  workflow_dispatch:
    inputs:
      checkpoint:
        description: Runtime checkpoint to execute
        required: true
        type: choice
        options:
          - premarket
          - '0930'
          - '1030'
          - '1300'
          - closing

permissions:
  contents: read

concurrency:
  group: morning-alpha-runtime-${{ github.event.schedule || inputs.checkpoint || github.run_id }}
  cancel-in-progress: false

env:
  FUNCTIONS_BASE_URL: https://cttfzgvhiewfckydcrci.supabase.co/functions/v1

jobs:
  resolve-checkpoint:
    runs-on: ubuntu-latest
    outputs:
      checkpoint: ${{ steps.resolve.outputs.checkpoint }}
    steps:
      - name: Resolve requested checkpoint
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
          MANUAL_CHECKPOINT: ${{ inputs.checkpoint }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            checkpoint="$MANUAL_CHECKPOINT"
          elif [ "$EVENT_SCHEDULE" = "15 23 * * 0-4" ]; then
            checkpoint="premarket"
          elif [ "$EVENT_SCHEDULE" = "25 1 * * 1-5" ]; then
            checkpoint="0930"
          elif [ "$EVENT_SCHEDULE" = "25 2 * * 1-5" ]; then
            checkpoint="1030"
          elif [ "$EVENT_SCHEDULE" = "55 4 * * 1-5" ]; then
            checkpoint="1300"
          elif [ "$EVENT_SCHEDULE" = "20 6 * * 1-5" ]; then
            checkpoint="closing"
          else
            echo "Unsupported schedule: $EVENT_SCHEDULE" >&2
            exit 1
          fi
          echo "checkpoint=$checkpoint" >> "$GITHUB_OUTPUT"

  premarket:
    needs: resolve-checkpoint
    if: needs.resolve-checkpoint.outputs.checkpoint == 'premarket'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Require runtime secret
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: test -n "$CRON_SECRET"

      - name: Fetch premarket reference snapshots
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          response_file="$RUNNER_TEMP/fetch-premarket-data.json"
          curl --silent --show-error --fail-with-body \
            --request POST "$FUNCTIONS_BASE_URL/fetch-market-data-v10" \
            --header "Content-Type: application/json" \
            --header "x-cron-secret: $CRON_SECRET" \
            --data '{"phase":"premarket"}' \
            --output "$response_file"
          jq -e '.success == true and .phase == "premarket" and .snapshot_upserted_count >= 1' "$response_file" >/dev/null

      - name: Generate and verify today's report
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          response_file="$RUNNER_TEMP/generate-daily-report.json"
          curl --silent --show-error --fail-with-body \
            --max-time 720 \
            --request POST "$FUNCTIONS_BASE_URL/generate-daily-report-v7" \
            --header "Content-Type: application/json" \
            --header "x-cron-secret: $CRON_SECRET" \
            --data '{}' \
            --output "$response_file"
          jq -e '.success == true and (.report_id | type == "string") and (.report_date | type == "string")' "$response_file" >/dev/null

  intraday:
    needs: resolve-checkpoint
    if: needs.resolve-checkpoint.outputs.checkpoint == '0930' || needs.resolve-checkpoint.outputs.checkpoint == '1030' || needs.resolve-checkpoint.outputs.checkpoint == '1300'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Require runtime secret
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: test -n "$CRON_SECRET"

      - name: Fetch fresh intraday snapshots
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          response_file="$RUNNER_TEMP/fetch-market-data.json"
          curl --silent --show-error --fail-with-body \
            --request POST "$FUNCTIONS_BASE_URL/fetch-market-data-v10" \
            --header "Content-Type: application/json" \
            --header "x-cron-secret: $CRON_SECRET" \
            --data '{"phase":"intraday"}' \
            --output "$response_file"
          jq -e '.success == true and .phase == "intraday" and .snapshot_upserted_count >= 2' "$response_file" >/dev/null

      - name: Evaluate checkpoint with the fresh snapshot
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          CHECKPOINT: ${{ needs.resolve-checkpoint.outputs.checkpoint }}
        run: |
          response_file="$RUNNER_TEMP/opening-market-radar.json"
          curl --silent --show-error --fail-with-body \
            --request POST "$FUNCTIONS_BASE_URL/opening-market-radar" \
            --header "Content-Type: application/json" \
            --header "x-cron-secret: $CRON_SECRET" \
            --data "{\"checkpoint\":\"$CHECKPOINT\"}" \
            --output "$response_file"
          jq -e '.success == true and .checkpoint == env.CHECKPOINT' "$response_file" >/dev/null

  closing:
    needs: resolve-checkpoint
    if: needs.resolve-checkpoint.outputs.checkpoint == 'closing'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Require runtime secret
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: test -n "$CRON_SECRET"

      - name: Fetch fresh close snapshots
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          response_file="$RUNNER_TEMP/fetch-close-data.json"
          curl --silent --show-error --fail-with-body \
            --request POST "$FUNCTIONS_BASE_URL/fetch-market-data-v10" \
            --header "Content-Type: application/json" \
            --header "x-cron-secret: $CRON_SECRET" \
            --data '{"phase":"close"}' \
            --output "$response_file"
          jq -e '.success == true and .phase == "close" and .snapshot_upserted_count >= 2' "$response_file" >/dev/null

      - name: Build closing review from the fresh close snapshot
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          response_file="$RUNNER_TEMP/close-market-review.json"
          curl --silent --show-error --fail-with-body \
            --request POST "$FUNCTIONS_BASE_URL/close-market-review" \
            --header "Content-Type: application/json" \
            --header "x-cron-secret: $CRON_SECRET" \
            --data '{}' \
            --output "$response_file"
          jq -e '.success == true and (.action == "written_and_synced" or .action == "skipped_idempotent" or .pending == true or .skipped == true)' "$response_file" >/dev/null

      - name: Write closing verification v2
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          response_file="$RUNNER_TEMP/closing-verification-v2.json"
          curl --silent --show-error --fail-with-body \
            --request POST "$FUNCTIONS_BASE_URL/closing-verification-engine" \
            --header "Content-Type: application/json" \
            --header "x-cron-secret: $CRON_SECRET" \
            --data '{}' \
            --output "$response_file"
          jq -e '.success == true and (.closing_verification_status == "completed" or .closing_verification_status == "direction_completed_data_degraded")' "$response_file" >/dev/null

      - name: Build sector rotation evidence for the next trading day
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          response_file="$RUNNER_TEMP/generate-sector-rotation.json"
          curl --silent --show-error --fail-with-body \
            --request POST "$FUNCTIONS_BASE_URL/generate-sector-rotation" \
            --header "Content-Type: application/json" \
            --header "x-cron-secret: $CRON_SECRET" \
            --data '{}' \
            --output "$response_file"
          jq -e '.success == true and (.score_date | type == "string")' "$response_file" >/dev/null
